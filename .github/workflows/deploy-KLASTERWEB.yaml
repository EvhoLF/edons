name: CI/CD Next.js Docker
on:
  push:
    branches:
      - main  # запускать при пуше в main
jobs:
  build-and-deploy-KLASTERWEB:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Deploy to server KLASTERWEB
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.KLASTERWEB__SERVER_HOST }}
          username: ${{ secrets.KLASTERWEB__SERVER_USER }}
          key: ${{ secrets.KLASTERWEB__SERVER_SSH_KEY }}
          script: |
            cd /var/www/edons_kz_usr/data/
            docker-compose pull   # тянем последние образы
            docker-compose up -d --remove-orphans