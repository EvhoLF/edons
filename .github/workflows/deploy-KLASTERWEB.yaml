name: CI/CD Next.js Docker
on:
  push:
    branches:
      - main # Запускать только при пуше в main
jobs:
  build-and-deploy-KLASTERWEB:
    runs-on: ubuntu-latest
    steps:
      # === ЭТАП 1. Клонируем репозиторий ===
      - name: Checkout repository
        uses: actions/checkout@v3
      # === ЭТАП 2. Логинимся в Docker Hub ===
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/edons:latest
          build-args: |
            ENV_PRODUCTION=${{ secrets.KLASTERWEB__ENV }}
      - name: Deploy to server (KLASTERWEB)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.KLASTERWEB__SERVER_HOST }}
          username: ${{ secrets.KLASTERWEB__SERVER_USER }}
          key: ${{ secrets.KLASTERWEB__SERVER_SSH_KEY }}
          script: |
            cd /var/www/edons_kz_usr/data/
            docker compose pull        # скачиваем новый образ с Docker Hub
            docker compose up -d --force-recreate --remove-orphans # пересоздаём контейнер
            docker image prune -f